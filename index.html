<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f0f0f0;
      padding: 30px;
    }
    img {
      width: 150px;
      margin-bottom: 10px;
    }
    #chat {
      width: 90%;
      max-width: 600px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      height: 400px;
      overflow-y: scroll;
    }
    .message {
      margin-bottom: 15px;
    }
    .robot {
      color: #1f8efa;
    }
    .user {
      text-align: right;
      color: #333;
    }
    input[type="text"] {
      width: 60%;
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px;
      margin-left: 10px;
      font-size: 16px;
    }
    select {
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <img src="A_2D_digital_illustration_of_a_friendly_robot_char.png" alt="Cute Robot" />
  <select id="scenario">
    <option value="">Select a practice topic...</option>
    <option value="Let's practice speaking at the airport.">✈️ At the Airport</option>
    <option value="Let's practice ordering food at a restaurant.">🍽️ Ordering at a Restaurant</option>
    <option value="Let's practice small talk in the office.">🏢 Office Small Talk</option>
    <option value="Let's practice a phone conversation.">📞 Phone Conversation</option>
    <option value="Let's practice shopping in a store.">🛒 Shopping Help</option>
  </select>
  <div id="chat"></div>
  <input type="text" id="input" placeholder="Talk to the robot..." />
  <button onclick="sendMessage()">Send</button>
  <button onclick="startListening()">🎤</button>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const scenario = document.getElementById('scenario');

    scenario.addEventListener('change', () => {
      const selected = scenario.value;
      if (selected) {
        addMessage(selected, 'user');
        fetchGPT(selected);
      }
    });

    async function sendMessage() {
      const userMessage = input.value;
      if (!userMessage) return;
      addMessage(userMessage, 'user');
      input.value = '';
      fetchGPT(userMessage);
    }

    async function fetchGPT(message) {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          headers: {
  'Content-Type': 'application/json',
  'Authorization': 'Bearer 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',
  'OpenAI-Organization': 'org-Vdqyx8y5y2EPQZkpRZJDf3iI'
},

        },
        body: JSON.stringify({
          model: 'gpt-4',
          messages: [{ role: 'user', content: message }]
        })
      });
      const data = await response.json();
      const reply = data.choices[0].message.content;
      addMessage(reply, 'robot');
      speak(reply);
    }

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'message ' + sender;
      div.innerText = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function speak(text) {
      const synth = window.speechSynthesis;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      synth.speak(utterance);
    }

    function startListening() {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onresult = function(event) {
        const speechResult = event.results[0][0].transcript;
        input.value = speechResult;
        sendMessage();
      }
      recognition.onerror = function(event) {
        console.error('Speech recognition error:', event.error);
      }
      recognition.start();
    }
  </script>
</body>
</html>
